<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="../style.css">
    <script src="../global.js" type="module"></script>
</head>
<body>
    <h1> Contact </h1>
      <form action="mailto:yadushan@ucsd.edu" method="POST" enctype="text/plain">

        <button type="submit">Submit</button>
      </form>
